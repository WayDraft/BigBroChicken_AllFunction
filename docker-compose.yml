version: "3.9"

services:
  backend:
    build: ./store-backend
    container_name: backend
    command: gunicorn store_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./store-backend:/app
    ports:
      - "8000:8000"

  frontend:
    build: ./store-frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend